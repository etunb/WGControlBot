# Bot only. WireGuard and firewall run on the host for full capability.
# Option: run WG in a privileged container and mount /etc/wireguard.
services:
  bot:
    build: .
    env_file: .env
    network_mode: host
    cap_add:
      - NET_ADMIN
    volumes:
      - ./data:/data
      - ./config.yaml:/app/config.yaml:ro
      - /etc/wireguard:/etc/wireguard
    environment:
      - CONFIG_PATH=/app/config.yaml
      - DATABASE_PATH=/data/bot.db
    restart: unless-stopped

  # Optional: run WireGuard in a sidecar (privileged, host network or extra caps)
