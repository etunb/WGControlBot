# Copy to config.yaml and fill in

wireguard:
  interface: wg0
  config_path: /etc/wireguard/wg0.conf
  # Common subnet — all devices see each other
  common_subnet: "10.0.113.0/24"
  # Isolated subnets: 10.0.1.0/24, 10.0.2.0/24, ...
  isolated_subnet_prefix: "10.0"
  isolated_subnet_mask: 24
  # Port is generated on first deploy; set manually if needed
  port: null

database:
  path: /data/bot.db

bot:
  token: ""
  admin_ids: []  # list of telegram user IDs

server:
  # Fill after running deploy.sh
  public_key: ""
  endpoint: ""  # host or IP (and port if not using server.port)
  port: null
