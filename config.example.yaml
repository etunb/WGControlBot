# Copy to config.yaml and fill in

wireguard:
  interface: wg0
  config_dir: /etc/wireguard
  config_path: /etc/wireguard/wg0.conf
  # Общая подсеть — все видят друг друга
  common_subnet: "10.0.113.0/24"
  # Подсети изолированы: 10.0.1.0/24, 10.0.2.0/24, ...
  isolated_subnet_prefix: "10.0"
  isolated_subnet_mask: 24
  # Порт генерируется при первом запуске, можно задать вручную
  port: null  # или например 51820

database:
  path: /data/bot.db

bot:
  token: ""
  admin_ids: []  # list of telegram user ids

server:
  # Публичный ключ и endpoint заполняются при деплое
  public_key: ""
  endpoint: ""  # host or ip:port
